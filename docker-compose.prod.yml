# ARCHIVO: docker-compose.prod.yml
# PROPÓSITO: Configuración de Docker Compose para producción con Nginx.
# AJUSTADO: Para convivir con daot.geobint.com via Nginx Proxy Manager.

version: '3.8'

services:
  # ─── Base de datos ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: pspp-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - pspp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Almacenamiento de archivos ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: pspp-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_prod:/data
    networks:
      - pspp-network

  # ─── GeoServer (WMS/WFS) ──────────────────────────────────────
  geoserver:
    image: kartoza/geoserver:2.23.0
    container_name: pspp-geoserver
    restart: always
    environment:
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
    volumes:
      - geoserver_prod:/opt/geoserver/data_dir
    networks:
      - pspp-network

  # ─── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pspp-backend
    restart: always
    command: npm start
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: "false"
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      GEOSERVER_URL: http://geoserver:8080/geoserver
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - pspp-network

  # ─── Nginx (reverse proxy + frontend estático) ─────────────────
  # NO expone puertos al host — NPM rutea el tráfico desde afuera.
  nginx:
    image: nginx:alpine
    container_name: pspp-nginx
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend-build
    networks:
      - pspp-network
      - npm-network

  # ─── Frontend build (solo genera archivos estáticos) ───────────
  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pspp-frontend-build
    command: sh -c "npm run build && cp -r /app/dist/* /output/"
    environment:
      VITE_API_URL: /api/v1
    volumes:
      - frontend_build:/output
    networks:
      - pspp-network

volumes:
  pgdata_prod:
  minio_prod:
  geoserver_prod:
  frontend_build:

networks:
  pspp-network:
    driver: bridge
  npm-network:
    external: true
    name: nginx-proxy-manager_default