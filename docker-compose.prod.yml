# ARCHIVO: docker-compose.prod.yml
# PROPÓSITO: Configuración de Docker Compose para producción con Nginx.
#
# MINI-CLASE: Producción vs Desarrollo en Docker
# ─────────────────────────────────────────────────────────────────
# En producción: (1) El frontend se compila con `npm run build` y
# los archivos estáticos se sirven con Nginx. (2) El backend usa
# `npm start` en vez de `npm run dev` (sin nodemon). (3) Nginx
# actúa como reverse proxy recibiendo todo el tráfico en el puerto
# 80 y distribuyéndolo entre frontend estático y backend API.
# (4) No se montan volúmenes de código fuente.
# ─────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ─── Base de datos ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - pspp-network

  # ─── Almacenamiento de archivos ────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_prod:/data
    networks:
      - pspp-network

  # ─── GeoServer (WMS/WFS) ──────────────────────────────────────
  geoserver:
    image: kartoza/geoserver:2.23.0
    restart: always
    environment:
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD}
    volumes:
      - geoserver_prod:/opt/geoserver/data_dir
    networks:
      - pspp-network

  # ─── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: npm start
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      - postgres
      - minio
    networks:
      - pspp-network

  # ─── Nginx (reverse proxy + frontend estático) ─────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - pspp-network

  # ─── Frontend build (solo genera archivos estáticos) ───────────
  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: sh -c "npm run build && cp -r /app/dist/* /output/"
    volumes:
      - frontend_build:/output
    networks:
      - pspp-network

volumes:
  pgdata_prod:
  minio_prod:
  geoserver_prod:
  frontend_build:

networks:
  pspp-network:
    driver: bridge
