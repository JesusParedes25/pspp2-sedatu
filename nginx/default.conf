# ARCHIVO: default.conf
# PROPÓSITO: Configuración de Nginx como reverse proxy para producción.
#
# MINI-CLASE: Nginx como reverse proxy
# ─────────────────────────────────────────────────────────────────
# En producción, Nginx recibe TODAS las peticiones HTTP y decide
# a dónde enviarlas: /api/* → backend (Node.js en puerto 3000),
# todo lo demás → archivos estáticos del frontend (React build).
# Esto desacopla el frontend del backend y permite servir los
# archivos estáticos con máxima eficiencia (gzip, cache headers).
# ─────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Frontend — archivos estáticos de React build
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxy al servicio Node.js
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout para subida de archivos grandes (shapefiles)
        client_max_body_size 200M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check
    location /health {
        proxy_pass http://backend:3000/health;
    }

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Cache de archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
